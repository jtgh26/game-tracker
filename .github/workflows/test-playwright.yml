name: 🧪 Test Playwright Fetch

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps
          
      - name: Test fetch 16p.com
        run: |
          python - << 'PYEOF'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                  locale='zh-CN',
              )
              page = context.new_page()
              page.goto("https://www.16p.com/newgame", timeout=30000)
              r = page.request.get(
                  "https://www.16p.com/gamecenter/api/test_game?date=2026-06-18&type_range=2&p=1",
                  headers={"Referer":"https://www.16p.com/","Accept":"application/json"}
              )
              print(f"Status: {r.status}")
              if r.status == 200:
                  import json
                  d = r.json()
                  total = sum(len(v) for v in d.get('dates',{}).values())
                  print(f"✅ SUCCESS: {total} games!")
              else:
                  print(f"❌ Failed: {r.text()[:200]}")
              browser.close()
          PYEOF
