name: 🎮 Daily Game Data Update

on:
  schedule:
    - cron: "0 1 * * *"   # 8:00 AM GMT+7
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📡 Fetch 16p.com + iTunes
        run: python scripts/fetch_all.py
        continue-on-error: true

      - name: 📊 Sync Google Sheets KPIs
        run: python scripts/fetch_sheets.py
        env:
          SHEETS_CSV_URL: ${{ secrets.SHEETS_CSV_URL }}
        continue-on-error: true

      - name: 🔨 Build index.html
        run: python scripts/build_html.py

      - name: 💾 Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html live_data.json || true
          git diff --staged --quiet || git commit -m "🤖 Auto update: $(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: 📋 Summary
        if: always()
        run: |
          echo "## 🎮 Game Tracker Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          if [ -f live_data.json ]; then
            NG=$(python -c "import json; d=json.load(open('live_data.json')); print(len(d.get('newgames',[])))")
            echo "- **Games tracked:** $NG" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Site:** https://jtgh26.github.io/game-tracker/" >> $GITHUB_STEP_SUMMARY
